      <h2>    AIM:- Java Script Events and Event Handlers:</h2>
      <h2>a) Write a simple client-side script that changes page content to introduce Static and dynamic web pages.</h2>

<textarea id="code1" rows="10" cols="80"><!DOCTYPE html>
<html>
<head>
    <title>Static vs Dynamic Web Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }
        #content {
            margin-top: 20px;
            font-size: 18px;
            color: darkblue;
        }
    </style>
</head>
<body>

    <h1>Web Pages Example</h1>

    <p id="content">
        Click a button to learn about Static or Dynamic Web Pages.
    </p>

    <!-- Buttons with Event Handlers -->
    <button onclick="showStatic()">Static Web Page</button>
    <button onclick="showDynamic()">Dynamic Web Page</button>

    <script>
        // Function for Static Web Page
        function showStatic() {
            document.getElementById("content").innerHTML =
            "<b>Static Web Page:</b><br><br>" +
            "A static web page shows the same content to every user.<br>" +
            "It is created using HTML and CSS only.<br>" +
            "Example: Simple portfolio website.";
        }

        // Function for Dynamic Web Page
        function showDynamic() {
            document.getElementById("content").innerHTML =
            "<b>Dynamic Web Page:</b><br><br>" +
            "A dynamic web page changes content based on user interaction.<br>" +
            "It uses JavaScript or server-side languages.<br>" +
            "Example: Login page, E-commerce website.";
        }
    </script>

</body>
</html></textarea>

<h2>  B) Implementing Client-Side Form Validation Using JavaScript various Form Elements in web page linking with Backend.</h2>
<textarea id="code2" rows="10" cols="80"><!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>

<script>

function validateForm()
{
    var name = document.myform.name.value;
    var email = document.myform.email.value;
    var password = document.myform.password.value;

    if(name == "")
    {
        alert("Name cannot be empty");
        return false;
    }

    if(email == "")
    {
        alert("Email cannot be empty");
        return false;
    }

    if(password.length < 6)
    {
        alert("Password must be at least 6 characters");
        return false;
    }

    alert("Form submitted successfully");
    return true;
}

</script>

</head>

<body>

<h2>Student Registration Form</h2>

<form name="myform" onsubmit="return validateForm()">

Name:
<input type="text" name="name"><br><br>

Email:
<input type="text" name="email"><br><br>

Password:
<input type="password" name="password"><br><br>

Gender:
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female<br><br>

Course:
<select>
<option>Computer Science</option>
<option>Information Technology</option>
<option>Data Science</option>
</select><br><br>

<input type="submit" value="Submit">

</form>

</body>
</html></textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
